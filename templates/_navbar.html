<!-- Shared design system and client utilities — Sprint 2 / Item #3, 2026-04-11.
     base.css loads first so per-template <style> blocks can still override.
     base.js provides fetchWithRetry, debounce, escapeHtml, $/$$, toast/confirmAction
     stubs to every page. _navbar.html is included at the top of <body> on every
     authenticated page, so both files are in scope before any page-local script runs. -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<script src="{{ url_for('static', filename='js/base.js') }}"></script>

<!-- CSRF token for AJAX requests -->
<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
// Auto-inject CSRF token into all fetch POST/PUT/DELETE requests.
// This stays in _navbar.html (not base.js) because it needs to run
// synchronously on every page before any other code triggers a fetch.
(function() {
    const origFetch = window.fetch;
    window.fetch = function(url, options) {
        options = options || {};
        if (options.method && options.method.toUpperCase() !== 'GET') {
            options.headers = options.headers || {};
            if (options.headers instanceof Headers) {
                if (!options.headers.has('X-CSRFToken')) {
                    const token = document.querySelector('meta[name="csrf-token"]');
                    if (token) options.headers.set('X-CSRFToken', token.content);
                }
            } else {
                if (!options.headers['X-CSRFToken']) {
                    const token = document.querySelector('meta[name="csrf-token"]');
                    if (token) options.headers['X-CSRFToken'] = token.content;
                }
            }
        }
        return origFetch.call(this, url, options);
    };
})();
</script>
<!-- fetchWithRetry moved to static/js/base.js on 2026-04-11.
     The global is still window.fetchWithRetry — no call site changes needed. -->

<!-- Upgrade Check banner — populated by upgrade_check.py background thread.
     Shown only when a strict X.Y.Z release newer than the installed version
     is reported by the release endpoint. Dismissible per-session via
     sessionStorage. Disable the whole feature with EXPRESSLANE_NO_UPGRADE_CHECK=true. -->
{% if upgrade_status and upgrade_status.available %}
<div id="expresslane-upgrade-banner" class="upgrade-banner" role="status">
    <i class="fas fa-rocket" aria-hidden="true"></i>
    <span>
        A newer version of <strong>ExpressLane</strong> is available:
        <strong>{{ upgrade_status.latest }}</strong>
        (you are on {{ version }}).
    </span>
    {% if upgrade_status.notes_url %}
    <a href="{{ upgrade_status.notes_url }}" target="_blank" rel="noopener noreferrer">
        View release notes
    </a>
    {% endif %}
    <button type="button" class="upgrade-banner-close"
            aria-label="Dismiss upgrade notice"
            onclick="dismissUpgradeBanner()">×</button>
</div>
<script>
(function() {
    try {
        if (sessionStorage.getItem('expresslane-upgrade-banner-dismissed') === '1') {
            var el = document.getElementById('expresslane-upgrade-banner');
            if (el) el.style.display = 'none';
        }
    } catch (e) { /* sessionStorage blocked — banner stays visible */ }
})();
function dismissUpgradeBanner() {
    try {
        sessionStorage.setItem('expresslane-upgrade-banner-dismissed', '1');
    } catch (e) { /* ignore */ }
    var el = document.getElementById('expresslane-upgrade-banner');
    if (el) el.style.display = 'none';
}
</script>
<style>
    .upgrade-banner {
        background: linear-gradient(90deg, #ffb700, #ff8a00);
        color: #1a1a1a;
        padding: 8px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: "Oracle Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 13px;
        font-weight: 500;
        border-bottom: 1px solid rgba(0,0,0,0.12);
    }
    .upgrade-banner i {
        font-size: 14px;
    }
    .upgrade-banner a {
        color: #1a1a1a;
        text-decoration: underline;
        font-weight: 600;
    }
    .upgrade-banner a:hover {
        text-decoration: none;
    }
    .upgrade-banner-close {
        margin-left: auto;
        background: transparent;
        border: none;
        color: #1a1a1a;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0 4px;
        font-weight: 700;
    }
    .upgrade-banner-close:hover {
        opacity: 0.7;
    }
</style>
